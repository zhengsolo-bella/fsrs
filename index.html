<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSRS 复习助手 · iCloud同步版</title>
<style>
  *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
  body{margin:0;padding:12px;background:#f8f9fc;}
  .container{max-width:700px;margin:0 auto;}
  .card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  h2{font-size:20px;margin:8px 0 16px;color:#222;}
  h3{font-size:16px;margin:8px 0;color:#333;}
  .subject-group {margin:18px 0 10px 0;padding:8px 12px;border-left:4px solid #636f81;background:#f8fafc;border-radius:0 8px 8px 0;font-size:15px;font-weight:600;color:#333;}
  input,textarea{width:100%;margin:6px 0;padding:10px 12px;border:1px solid #e2e8f0;border-radius:12px;font-size:15px;}
  textarea{resize:vertical;min-height:80px;}
  button{border:none;border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;margin:3px;}
  .btn-primary{background:#636f81;color:white;}
  .btn-review{background:#10b8b1;color:white;}
  .btn-hard{background:#f59e0b;color:white;}
  .btn-easy{background:#3b82f6;color:white;}
  .btn-edit{background:#06b6d4;color:white;}
  .btn-del{background:#ef4444;color:white;}
  .btn-export{background:#16a34a;color:white;}
  .btn-import{background:#14b8a6;color:white;}
  .btn-filter{background:#eef2ff;color:#4f46e5;border:1px solid #ddd;}
  .btn-filter.active{background:#4f46e5;color:#fff;border:1px solid #4f46e5;}
  .btn-sync{background:#0071e3;color:white;}
  .btn-upload{background:#7c3aed;color:white;}
  .subject-row{padding:12px 8px;margin:8px 0;background:#fdfdfe;border-radius:8px;}
  .due{color:#ef4444;font-weight:600;}
  .normal{color:#647888;}
  .filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;padding:8px;background:#f5f7fa;border-radius:10px;}
  .empty-tip{color:#94a3b8;padding:16px;text-align:center;font-size:14px;}
  .img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin:8px 0;border:1px solid #f1f5f9;}
  .img-show{width:100%;max-height:150px;object-fit:contain;border-radius:6px;margin:6px 0;}
  .upload-area{display:flex;align-items:center;gap:8px;margin:8px 0;}
  #imgFile,#importFile{display:none;}
  .sync-tip{font-size:12px;color:#0071e3;text-align:center;margin:4px 0;}
</style>
</head>
<body>
<div class="container">
  <div class="sync-tip">🍎 苹果设备专属 | iCloud Drive同步 + 本地永久保存 | 支持图文知识点</div>
  <div class="card">
    <h2>🧠 FSRS 复习助手（iCloud版）</h2>
    <div class="top-actions">
      <button class="btn-import" onclick="importClick()">导入</button>
      <button class="btn-export" onclick="exportCSV()">导出 CSV</button>
      <button class="btn-sync" onclick="syncICloud()">🔄 同步iCloud</button>
      <input type="file" id="importFile" accept=".csv" style="display:none">
    </div>
    <input id="subject" placeholder="科目：数学/英语/物理等">
    <textarea id="content" placeholder="知识点文字（可搭配图片）"></textarea>
    <div class="upload-area">
      <button class="btn-upload" onclick="document.getElementById('imgFile').click()">📷 上传图片</button>
      <span id="imgTip">未选择图片</span>
      <input type="file" id="imgFile" accept="image/*" style="display:none">
    </div>
    <img id="previewImg" class="img-preview" src="" alt="图片预览" style="display:none">
    <button class="btn-primary" onclick="addItem()">添加知识点</button>
  </div>

  <div class="card">
    <h3>📅 今日待复习</h3>
    <div class="filter-bar" id="dueFilterBar"></div>
    <div id="dueList"></div>
  </div>

  <div class="card">
    <h3>📚 全部知识点</h3>
    <div class="filter-bar" id="allFilterBar"></div>
    <div id="allList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const STORAGE_KEY = "fsrs_local_data";
const ICLD_FILE_NAME = "fsrs-data.json";
const ICLD_FOLDER = "FSRS复习助手";
let dataList = [];
let dueFilter = "all", allFilter = "all";
let tempImgBase64 = "";

// 本地存储
function loadLocal() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    dataList = s ? JSON.parse(s) : [];
  } catch (e) { dataList = []; }
}
function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(dataList));
}

// iCloud 基础判断
function isSupported() {
  return !!window.showOpenFilePicker;
}

// 选择 iCloud 文件夹
async function getICloudFolder() {
  if (!isSupported()) return null;
  try {
    const [root] = await window.showOpenFilePicker({
      type: "folder", startIn: "icloudDrive", multiple: false
    });
    return await root.getDirectoryHandle(ICLD_FOLDER, { create: true });
  } catch (e) {
    alert("请允许访问 iCloud Drive");
    return null;
  }
}

// 读取 iCloud
async function loadICloud() {
  const folder = await getICloudFolder();
  if (!folder) return [];
  try {
    const file = await folder.getFileHandle(ICLD_FILE_NAME, { create: false });
    const blob = await file.getFile();
    const text = await blob.text();
    return JSON.parse(text) || [];
  } catch (e) {
    return [];
  }
}

// 写入 iCloud
async function saveICloud(data) {
  const folder = await getICloudFolder();
  if (!folder) return false;
  try {
    const file = await folder.getFileHandle(ICLD_FILE_NAME, { create: true });
    const w = await file.createWritable();
    await w.write(JSON.stringify(data, null, 2));
    await w.close();
    return true;
  } catch (e) {
    alert("保存 iCloud 失败");
    return false;
  }
}

// 合并数据（去重）
function mergeData(cloud, local) {
  const map = new Map();
  [...local, ...cloud].forEach(item => {
    const key = item.subject + "|" + item.content;
    map.set(key, item);
  });
  return Array.from(map.values());
}

// 同步按钮
async function syncICloud() {
  if (!isSupported()) {
    alert("❌ 仅支持苹果 Safari / Chrome");
    return;
  }
  const cloudData = await loadICloud();
  const merged = mergeData(cloudData, dataList);
  const ok = await saveICloud(merged);
  if (ok) {
    dataList = merged;
    saveLocal();
    render();
    alert("✅ iCloud 同步成功\n总数：" + merged.length);
  }
}

// 图片
document.getElementById('imgFile').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f || !f.type.startsWith('image/')) return;
  const r = new FileReader();
  r.onload = ev => {
    tempImgBase64 = ev.target.result;
    const img = document.getElementById('previewImg');
    img.src = tempImgBase64;
    img.style.display = "block";
    document.getElementById('imgTip').textContent = "已选图片";
  };
  r.readAsDataURL(f);
});

// 工具
function now() {
  return Math.floor(Date.now() / 86400000);
}

// 添加
function addItem() {
  const sub = document.getElementById('subject').value.trim();
  const cnt = document.getElementById('content').value.trim();
  if (!sub || !cnt) {
    alert("请填写科目和内容");
    return;
  }
  dataList.push({
    subject: sub,
    content: cnt,
    due: now() + 1,
    lastDays: 0,
    img: tempImgBase64
  });
  document.getElementById('subject').value = "";
  document.getElementById('content').value = "";
  document.getElementById('imgTip').textContent = "未选择图片";
  document.getElementById('previewImg').style.display = "none";
  tempImgBase64 = "";
  saveLocal();
  render();
}

// 复习
function review(idx, grade) {
  const it = dataList[idx];
  it.lastDays = it.lastDays || 0;
  let factor;
  if (grade === 2) factor = 1.5;
  else if (grade === 3) factor = 2;
  else factor = 3;
  const next = Math.max(1, Math.round(it.lastDays * factor));
  it.due = now() + next;
  it.lastDays = next;
  saveLocal();
  render();
}

// 修改
function editItem(idx) {
  const it = dataList[idx];
  const s = prompt("科目", it.subject);
  const c = prompt("内容", it.content);
  if (s == null || c == null) return;
  it.subject = s.trim();
  it.content = c.trim();
  saveLocal();
  render();
}

// 删除
function deleteItem(idx) {
  if (!confirm("确定删除？")) return;
  dataList.splice(idx, 1);
  saveLocal();
  render();
}

// 筛选栏
function renderFilterBar(containerId, current, onChange) {
  const container = document.getElementById(containerId);
  const subs = [...new Set(dataList.map(x => x.subject || "未分类"))].sort();
  let html = `<button class="btn-filter ${current==='all'?'active':''}" onclick="${onChange}('all')">全部</button>`;
  subs.forEach(sub => {
    html += `<button class="btn-filter ${current===sub?'active':''}" onclick="${onChange}('${sub}')">${sub}</button>`;
  });
  container.innerHTML = subs.length ? html : '<div class="empty-tip">暂无科目</div>';
}

function changeDueFilter(sub) {
  dueFilter = sub; render();
}
function changeAllFilter(sub) {
  allFilter = sub; render();
}

// 渲染列表
function renderList(el, list, showReview) {
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-tip">暂无知识点</div>';
    return;
  }
  const groups = {};
  list.forEach(item => {
    const k = item.subject || "未分类";
    groups[k] = groups[k] || [];
    groups[k].push(item);
  });
  let html = "";
  Object.keys(groups).sort().forEach(sub => {
    html += `<div class="subject-group">📁 ${sub}（${groups[sub].length}）</div>`;
    groups[sub].forEach(it => {
      const idx = dataList.findIndex(x => 
        x.subject === it.subject && x.content === it.content
      );
      const dueText = it.due <= now() 
        ? '<span class="due">今天复习</span>' 
        : `${it.due - now()} 天后`;
      const reviewBtns = showReview ? `
        <button class="btn-hard" onclick="review(${idx},2)">模糊</button>
        <button class="btn-review" onclick="review(${idx},3)">记得</button>
        <button class="btn-easy" onclick="review(${idx},4)">熟练</button>
      ` : "";
      const imgHtml = it.img ? `<img src="${it.img}" class="img-show">` : "";
      html += `
        <div class="subject-row">
          <div>${it.content}</div>
          ${imgHtml}
          <div class="normal" style="margin:6px 0;">${dueText}</div>
          <div>
            ${reviewBtns}
            <button class="btn-edit" onclick="editItem(${idx})">修改</button>
            <button class="btn-del" onclick="deleteItem(${idx})">删除</button>
          </div>
        </div>
      `;
    });
  });
  el.innerHTML = html;
}

// 全局渲染
function render() {
  const today = now();
  renderFilterBar("dueFilterBar", dueFilter, "changeDueFilter");
  renderFilterBar("allFilterBar", allFilter, "changeAllFilter");

  const dueItems = dataList.filter(x => x.due <= today);
  const allItems = dataList;

  const filteredDue = dueFilter === "all" 
    ? dueItems 
    : dueItems.filter(x => x.subject === dueFilter);

  const filteredAll = allFilter === "all"
    ? allItems
    : allItems.filter(x => x.subject === allFilter);

  renderList(document.getElementById("dueList"), filteredDue, true);
  renderList(document.getElementById("allList"), filteredAll, false);
}

// 导入
function importClick() {
  document.getElementById('importFile').click();
}
document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: "array" });
      const arr = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
      let count = 0;
      for (let i = 1; i < arr.length; i++) {
        const [sub, cnt] = arr[i] || [];
        if (sub && cnt) {
          dataList.push({
            subject: sub + "",
            content: cnt + "",
            due: now() + 1,
            lastDays: 0,
            img: ""
          });
          count++;
        }
      }
      saveLocal();
      render();
      alert(`导入成功：${count} 条`);
    } catch (err) {
      alert("导入失败");
    }
    e.target.value = "";
  };
  r.readAsArrayBuffer(f);
});

// 导出
function exportCSV() {
  const rows = [["科目", "知识点"]];
  dataList.forEach(it => rows.push([it.subject, it.content]));
  const csv = XLSX.utils.sheet_to_csv(XLSX.utils.aoa_to_sheet(rows));
  const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {
    type: "text/csv;charset=utf-8"
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "FSRS知识点.csv";
  a.click();
}

// 启动
loadLocal();
render();
</script>
</body>
</html>
